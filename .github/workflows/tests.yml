name: API Automation Tests

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Pytest with Allure
        run: pytest --alluredir=allure-results || true

      # ✅ Install Java (required for Allure)
      - name: Install Java
        run: sudo apt-get update && sudo apt-get install -y default-jre

      # ✅ Install Allure (stable way)
      - name: Install Allure
        run: |
          wget https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -zxvf allure-2.27.0.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      # ✅ Generate report
      - name: Generate Allure Report
        run: allure generate allure-results --clean -o allure-report

      # ✅ Upload artifact (v4 correct)
      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report